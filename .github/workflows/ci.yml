name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Fetch private engine module
        env:
          # This token is the only way the public repo's CI can resolve
          # github.com/Nil-Vaghani/syncwell-engine. It must be a fine-scoped PAT
          # with read-only access to that single private repo. Configure
          # it as a repository secret named GITHUB_TOKEN in GitHub
          # settings — never commit it.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The runner ships a git credential helper (set up by
          # actions/checkout). Without this, the helper intercepts the
          # `go mod download` request and prompts for a password; the
          # runner has terminal prompts disabled, so it fails with
          # "could not read Password for 'https://***@github.com'".
          # Setting GIT_TERMINAL_PROMPT=0 makes git fail loud instead,
          # and the token embedded in the URL rewrite above is what
          # actually gets used for auth.
          GIT_TERMINAL_PROMPT: 0
        run: |
          git config --global url."https://${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/Nil-Vaghani/*
          go mod download

      - name: Vet & build
        run: |
          go vet ./...
          go build ./...

      - name: Client CRDT tests
        run: |
          node sdk/crdt.test.js

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker build \
            --build-arg GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -t syncwell:ci .

      - name: Verify the engine source is not in the image
        run: |
          # The distroless base has no shell. Use `docker create` to get
          # a temporary container and copy the binary out for inspection.
          cid=$(docker create syncwell:ci)
          docker cp "${cid}:/syncwell" /tmp/syncwell
          docker rm "${cid}"
          # No "syncwell/internal" string should appear in the binary.
          # We only expect to see "syncwell-engine/pkg/engine" (the public
          # façade import path).
          if strings /tmp/syncwell | grep -q 'syncwell/internal'; then
            echo "ERROR: internal/ path leaked into the binary"
            exit 1
          fi
          echo "ok: no internal/ paths in binary"
