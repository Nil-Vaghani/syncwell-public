# Fly.io configuration for the public Syncwell demo.
#
# This file lives in the public repository. Secrets (SYNCWELL_SECRET and
# the GITHUB_TOKEN used at build time) are NOT set here — they are managed
# with `fly secrets set` / `fly secrets import` and live only in Fly's
# secret store. See DEPLOY.md for the full sequence.
#
# Replace `Nil-Vaghani` in `app = "Nil-Vaghani-syncwell-demo"` and `primary_region`
# before running `fly launch`.

app = "Nil-Vaghani-syncwell-demo"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  SYNCWELL_ADDR = ":8080"
  # The public Origins allow-list. Set to the actual deployed hostname in
  # production; the wildcard below is convenient for the demo because the
  # WebSocket upgrade comes from the same origin. Replace with the
  # production hostname before going live.
  SYNCWELL_ORIGINS = "https://Nil-Vaghani-syncwell-demo.fly.dev"

# One service: HTTP + WebSockets on the same port. The Go binary routes
# /ws, /stats, /healthz, /sdk/, and / internally, so we expose a single
# port and let the application's mux do the work.
[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/healthz"

[deploy]
  # No release-time migrations — persistence is directory-keyed. We still
  # set a release_command so Fly waits for the new machine to be healthy
  # before destroying the old one.
  release_command = "echo syncwell release ok"
  strategy = "rolling"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
