<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Syncwell — live multiplayer demo</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 15px/1.5 system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
      h1 { margin-bottom: 4px; }
      .sub { color: #888; margin-top: 0; }
      #status { font-size: 13px; padding: 2px 8px; border-radius: 6px; background: #eee; color: #555; }
      #status.live { background: #d8f5dd; color: #137333; }
      textarea { width: 100%; height: 160px; font: 15px/1.5 ui-monospace, monospace; padding: 10px; box-sizing: border-box; }
      label { font-weight: 600; display: block; margin: 18px 0 6px; }
      input[type=text] { width: 100%; padding: 8px; box-sizing: border-box; font-size: 15px; }
      #peers { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
      .peer { width: 14px; height: 14px; border-radius: 50%; }
      .hint { color: #888; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>Syncwell</h1>
    <p class="sub">Open this page in two windows — edits sync live, and reconnect after going offline. <span id="status">connecting…</span></p>

    <label for="title">Shared title</label>
    <input id="title" type="text" placeholder="Type a title…" />

    <label for="doc">Shared notes</label>
    <textarea id="doc" placeholder="Type here — every keystroke syncs to all peers…"></textarea>

    <label>Live peers</label>
    <div id="peers"></div>
    <p class="hint">Each dot is another connected client. Try killing the server and restarting it — the page reconnects and re-syncs automatically. &nbsp;<a href="/kanban.html">See the collaborative kanban demo →</a></p>

    <script type="module">
      import { Syncwell } from "/sdk/syncwell.js";

      const statusEl = document.getElementById("status");
      const titleEl = document.getElementById("title");
      const docEl = document.getElementById("doc");
      const peersEl = document.getElementById("peers");

      // A stable per-tab color so peers are visually distinguishable.
      const myHue = Math.floor(Math.random() * 360);
      const peers = new Map(); // clientId -> hue

      const sw = new Syncwell(`ws://${location.host}/ws`, "demo");

      function renderPeers() {
        peersEl.innerHTML = "";
        for (const hue of peers.values()) {
          const d = document.createElement("div");
          d.className = "peer";
          d.style.background = `hsl(${hue} 70% 55%)`;
          peersEl.appendChild(d);
        }
      }

      // Render the local replica into the inputs, without clobbering the caret
      // of a field the user is actively typing in.
      function render(live) {
        if (document.activeElement !== titleEl) titleEl.value = live.title ?? "";
        if (document.activeElement !== docEl) docEl.value = live.doc ?? "";
      }

      sw.on("open", () => {
        statusEl.textContent = "live";
        statusEl.className = "live";
        sw.presence({ hue: myHue });
      });
      sw.on("close", () => {
        statusEl.textContent = "offline — editing locally, will resync…";
        statusEl.className = "";
      });
      // One event for all state changes (local optimistic writes and remote
      // ops both flow through the local CRDT).
      sw.on("change", render);
      sw.on("presence", ({ clientId, data }) => {
        if (data?.hue != null) {
          peers.set(clientId, data.hue);
          renderPeers();
          sw.presence({ hue: myHue }); // echo so newcomers learn about us
        }
      });
      sw.on("leave", ({ clientId }) => {
        peers.delete(clientId);
        renderPeers();
      });

      titleEl.addEventListener("input", () => sw.set("title", titleEl.value));
      docEl.addEventListener("input", () => sw.set("doc", docEl.value));

      sw.connect();
    </script>
  </body>
</html>
